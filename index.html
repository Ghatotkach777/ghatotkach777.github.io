<!DOCTYPE html>
<html>
<head>
    <title>GK</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            text-align: left;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 8px;
            border: none;
            padding: 10px;
            font-family: monospace;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            background: #38bdf8;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

<h1>🚀 Code Vault</h1>

<div class="container">

    <!-- Card 1 -->
    <div class="card">
        <h3>VIEWS</h3>
        <textarea id="code1">
1. CREATE VIEW newyorkstaff AS SELECT * FROM salesman WHERE city =
'New York';
2. CREATE VIEW salesown AS SELECT salesman_id, name, city FROM
salesman;
3. CREATE VIEW gradecount (grade, number) AS SELECT grade, COUNT(*)
FROM customer GROUP BY grade;
4. CREATE VIEW totalforday AS SELECT ord_date, COUNT(DISTINCT
customer_id), AVG(purch_amt), SUM(purch_amt) FROM orders GROUP BY
ord_date;
5. CREATE VIEW citynum AS SELECT city, COUNT (DISTINCT salesman_id)
FROM salesman GROUP BY city;
</textarea>
        <button onclick="copyCode('code1')">Copy Code</button>
    </div>

    <!-- Card 2 -->
    <div class="card">
        <h3>JOINS</h3>
        <textarea id="code2">
1. Inner Join
SELECT Student.admission_no, Student.first_name, Student.last_name,
Fee.course, Fee.amount_paid FROM Student
INNER JOIN Fee
ON Student.admission_no = Fee.admission_no;
2. Self Join
SELECT S1.first_name, S2.last_name, S2.city FROM Student S1, Student S2
WHERE S1.id <> S2.iD AND S1.city = S2.city ORDER BY S2.city;
3. Left Outer
SELECT Student.admission_no, Student.first_name, Student.last_name, Fee.course,
Fee.amount_paid
FROM Student
LEFT OUTER JOIN Fee
ON Student.admission_no = Fee.admission_no;
4. Right Join
SELECT Student.admission_no, Student.first_name, Student.last_name,
Fee.course, Fee.amount_paid FROM Student
RIGHT OUTER JOIN Fee
ON Student.admission_no = Fee.admission_no;
5. Outer join
SELECT Student.admission_no, Student.first_name, Student.last_name, Fee.course, Fee.amount
_paid FROM Student
FULL OUTER JOIN Fee
ON Student.admission_no = Fee.admission_no;
6. Cross Join
SELECT Student.admission_no, Student.first_name, Student.last_name, Fee.course, Fee.amount
_paid
FROM Student
CROSS JOIN Fee
WHERE Student.admission_no = Fee.admission_no;
</textarea>
        <button onclick="copyCode('code2')">Copy Code</button>
    </div>

    <!-- Card 3 -->
    <div class="card">
        <h3>DATE</h3>
        <textarea id="code3">
SELECT SYSDATETIME() AS SysDateTime;
SELECT DAY('2024/01/25') AS DayOfMonth;
SELECT MONTH('2024/01,25') AS Month
SELECT year('2024/01/25') AS YEAR
SELECT DATEADD(year, 1, '2024/01/25') AS DateAdd;
SELECT DATEADD(month, 1, '2024/01/25') AS DateAdd;
SELECT DATEADD(DAY, 10, '2024/01/25') AS DateAdd;
SELECT DATEDIFF(YEAR, '2011/08/25', '2017/08/25') AS years;
SELECT DATEDIFF(MONTH, '2011/08/25', '2017/08/25') AS months;
SELECT DATEDIFF(DAY, '2011/08/25', '2017/08/25') AS Days;
</textarea>
        <button onclick="copyCode('code3')">Copy Code</button>
    </div>

    <!-- Card 4 -->
    <div class="card">
        <h3>math function</h3>
        <textarea id="code4">
1) Display the ceiling value of 56.78 as ceiling
SELECT CEILING(56.78) AS ceiling;
2) Find the ceiling value of -56.78 as ceiling
SELECT CEILING(-56.78) AS ceiling;
3) Find the floor value of 56.78 as floor
SELECT FLOOR(56.78) AS floor;
4) Find the floor value of -56.78 as floor
SELECT FLOOR(-56.78) AS floor;
5) Evaluate 5 to the power of 3 as power
SELECT POWER(5,3) AS power;
6) Find the value of PI as pi
SELECT PI() AS pi;
7) Display the square root of 144 as square_root
SELECT SQRT(144) AS square_root;
8) Find the square of 13 as square
SELECT POWER(13,2) AS square;
9) Display 435.789 rounding to 2 digits as round_value
SELECT ROUND(435.789,2) AS round_value;
10) Display 435.7896 rounding to 3 digits as round_value
SELECT ROUND(435.7896,3) AS round_value;
</textarea>
        <button onclick="copyCode('code4')">Copy Code</button>
    </div>

    <!-- Card 5 -->
    <div class="card">
        <h3>STRING</h3>
        <textarea id="code5">
1.	Select LOWER(job) from fy_emp
2.	select concat(ename,' ', job) from fy_EMP
3.	select SUBSTRING(job,1,5) from fy_EMP where job='SALESMAN';
4.	select REPLACE(job,'PRESIDENT','VP') as newjobtitle from fy_EMP;
5.	SELECT     * FROM fy_emp WHERE LENGTH(first_name) >= 8;
6.	Select Ltrim(“   I Like SQL”) as Left_trim, Rtrim(‘I like SQL                  ’)  as RightTrim, Trim (‘     I like SQL     ’) as Trim;
</textarea>
        <button onclick="copyCode('code5')">Copy Code</button>
    </div>

</div>

<script>
function copyCode(id) {
    let text = document.getElementById(id);
    text.select();
    document.execCommand("copy");
    alert("Code copied!");
}
</script>

</body>
</html>
